{% extends "layouts/base.html" %}

{% block content %}
<!-- ─── Page Header ─── -->
<div class="page-header">
    <h2><i class="bi bi-plus-circle-fill me-2"></i>Yeni Fiş Oluştur</h2>
</div>

<!-- ─── Üst Bilgi Formu ─── -->
<div class="form-section">
    <div class="form-section-title"><i class="bi bi-truck me-2"></i>Kamyon / Fiş Bilgileri</div>
    <div class="row g-3">
        <div class="col-md-4">
            <label for="tarih" class="form-label">Tarih</label>
            <input type="date" class="form-control" id="tarih" value="{{ bugun }}" required>
        </div>
        <div class="col-md-4">
            <label for="sevk_eden_cari" class="form-label">Sevk Eden Cari</label>
            <select class="form-select" id="sevk_eden_cari_select" onchange="toggleManualInput('sevk_eden_cari'); fetchMevcutStok();"
                required>
                <option value="" disabled selected>Cari seçin...</option>
                {% for c in cariler %}
                <option value="{{ c.firma_kodu }}" data-adi="{{ c.firma_adi }}">{{ c.firma_adi }}</option>
                {% endfor %}
                <option value="other">-- Diğer / Manuel Giriş --</option>
            </select>
            <input type="text" class="form-control mt-2 shadow-sm border-primary" id="sevk_eden_cari_manual"
                placeholder="Manuel firma adı girin..." style="display:none;">
            <!-- Cari stok bilgisi ve global checkbox alanı kalem bazlıya taşındı -->
        </div>
        <div class="col-md-4">
            <label for="plaka_no" class="form-label">Plaka No</label>
            <input type="text" class="form-control" id="plaka_no" placeholder="34 ABC 123" required>
        </div>
        <div class="col-md-6">
            <label for="sevk_yeri_fabrika" class="form-label">Sevk Yeri / Fabrika</label>
            <select class="form-select" id="sevk_yeri_fabrika_select" onchange="toggleManualInput('sevk_yeri_fabrika')"
                required>
                <option value="" disabled selected>Fabrika seçin...</option>
                {% for f in fabrikalar %}
                <option value="{{ f.firma_kodu }}" data-adi="{{ f.firma_adi }}">{{ f.firma_adi }}</option>
                {% endfor %}
                <option value="other">-- Diğer / Manuel Giriş --</option>
            </select>
            <input type="text" class="form-control mt-2 shadow-sm border-info" id="sevk_yeri_fabrika_manual"
                placeholder="Manuel fabrika adı girin..." style="display:none;">
        </div>
        <div class="col-md-6">
            <label for="sevk_yeri_fis_no" class="form-label">Sevk Yeri Fiş No</label>
            <input type="text" class="form-control" id="sevk_yeri_fis_no" placeholder="Fiş numarası..." required>
        </div>
    </div>
</div>

<!-- ─── Detay Satırları ─── -->
<div class="form-section">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-section-title mb-0 border-0 pb-0"><i class="bi bi-list-check me-2"></i>Sevk Edilen Odun Cinsi</div>
        <button type="button" class="btn btn-ma-primary" id="btnKalemEkle" onclick="kalemEkle()">
            <i class="bi bi-plus-lg me-1"></i> Sevk Edilen Odun Cinsi Ekle
        </button>
    </div>
    <div id="kalemlerContainer">
        <!-- Dinamik satırlar buraya eklenir -->
    </div>
    <div id="kalemUyari" class="text-muted text-center py-3" style="display:block;">
        <i class="bi bi-info-circle me-1"></i> "Sevk Edilen Odun Cinsi Ekle" butonuna tıklayarak ağaç cinsi ve ölçü satırları ekleyin.
    </div>
</div>

<!-- ─── Submit ─── -->
<div class="d-grid gap-2 mb-4">
    <button type="button" class="btn btn-ma-primary btn-lg" id="btnKaydet" onclick="fisKaydet()">
        <i class="bi bi-check-circle-fill me-1"></i> Fişi Kaydet
    </button>
</div>

<!-- ─── Sonuç Modalı ─── -->
<div class="modal fade" id="sonucModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:16px; overflow:hidden;">
            <div class="modal-header" id="sonucModalHeader">
                <h5 class="modal-title" id="sonucModalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <div id="sonucModalIcon" style="font-size:3rem; margin-bottom:0.75rem;"></div>
                <p id="sonucModalMesaj" class="mb-0 fs-5"></p>
            </div>
            <div class="modal-footer justify-content-center" id="sonucModalFooter">
                <a href="{{ url_for('fis.fisleri_goruntule') }}" class="btn btn-ma-accent">
                    <i class="bi bi-list-ul me-1"></i> Fişlere Git
                </a>
                <button type="button" class="btn btn-ma-outline" data-bs-dismiss="modal" onclick="formuSifirla()">
                    <i class="bi bi-plus-lg me-1"></i> Yeni Fiş
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // ─── Dropdown verileri (Jinja'dan) ───
    const agacCinsleri = JSON.parse('{{ agac_cinsleri | tojson | safe }}');
    const capler = JSON.parse('{{ capler | tojson | safe }}');
    const birimler = JSON.parse('{{ birimler | tojson | safe }}');

    let kalemSayaci = 0;
    let mevcutStokData = [];

    // ─── Dropdown option builder ───
    function optionlarOlustur(dizi, secilen) {
        return dizi.map(item =>
            `<option value="${item}" ${item === secilen ? 'selected' : ''}>${item}</option>`
        ).join('');
    }

    // ─── Kalem Satırı Ekle ───
    function kalemEkle() {
        kalemSayaci++;
        const container = document.getElementById('kalemlerContainer');
        document.getElementById('kalemUyari').style.display = 'none';

        const div = document.createElement('div');
        div.className = 'kalem-satiri';
        div.id = `kalem-${kalemSayaci}`;
        div.innerHTML = `
            <span class="kalem-no">Sevk Edilen Odun Cinsi ${kalemSayaci}</span>
            <button type="button" class="btn-sil-kalem" onclick="kalemSil(${kalemSayaci})">
                <i class="bi bi-x-lg"></i> Sil
            </button>
            <div class="row g-2 mt-1">
                <div class="col-6 col-md-3">
                    <label class="form-label">Ağaç Cinsi</label>
                    <select class="form-select kalem-agac" onchange="stokBilgisiGuncelle(this)">${optionlarOlustur(agacCinsleri)}</select>
                    <small class="text-primary fw-bold mt-1 d-block kalem-stok-bilgi"></small>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label">Çap</label>
                    <select class="form-select kalem-cap">${optionlarOlustur(capler)}</select>
                </div>
                <div class="col-4 col-md-2">
                    <label class="form-label">Miktar</label>
                    <input type="number" class="form-control kalem-miktar" step="0.01" min="0" placeholder="0.00">
                </div>
                <div class="col-4 col-md-2">
                    <label class="form-label">Birim</label>
                    <select class="form-select kalem-birim">${optionlarOlustur(birimler)}</select>
                </div>
                <div class="col-4 col-md-3">
                    <label class="form-label">Birim Fiyat (₺)</label>
                    <input type="number" class="form-control kalem-birim-fiyat" step="0.01" min="0" placeholder="0.00">
                    <div class="form-check mt-2">
                        <input class="form-check-input kalem-stok-disi" type="checkbox" tabindex="-1">
                        <label class="form-check-label text-muted small" style="font-size: 0.75rem;">Stok dışı bırak (Düşme)</label>
                    </div>
                </div>
            </div>
        `;
        container.appendChild(div);
    }

    // ─── Kalem Satırı Sil ───
    function kalemSil(no) {
        const el = document.getElementById(`kalem-${no}`);
        if (el) el.remove();
        // Kalan kalem var mı kontrol et
        if (document.querySelectorAll('.kalem-satiri').length === 0) {
            document.getElementById('kalemUyari').style.display = 'block';
        }
    }

    // ─── Manuel Giriş Alanını Aç/Kapat ───
    function toggleManualInput(id) {
        const select = document.getElementById(id + '_select');
        const manual = document.getElementById(id + '_manual');
        if (select.value === 'other') {
            manual.style.display = 'block';
            manual.required = true;
            manual.focus();
        } else {
            manual.style.display = 'none';
            manual.required = false;
        }
    }

    // ─── Cari Stok Bilgisini Getir ───
    function fetchMevcutStok() {
        const cariSelect = document.getElementById('sevk_eden_cari_select');
        mevcutStokData = [];
        document.querySelectorAll('.kalem-stok-bilgi').forEach(el => el.innerHTML = '');
        
        if (cariSelect.value === '' || cariSelect.value === 'other') return;

        const selectedOption = cariSelect.options[cariSelect.selectedIndex];
        const cariKodu = cariSelect.value === 'other' ? null : (cariSelect.value || null);
        
        if (!cariKodu) return;

        fetch(`/api/stok_getir/${encodeURIComponent(cariKodu)}`)
            .then(res => res.json())
            .then(data => {
                if (data.durum === 'basarili' && data.mevcut_stok.length > 0) {
                    mevcutStokData = data.mevcut_stok;
                }
                document.querySelectorAll('.kalem-agac').forEach(sel => stokBilgisiGuncelle(sel));
            })
            .catch(err => {
                console.error("Stok bilgisi çekilemedi: ", err);
            });
    }

    // ─── Kalem Bazlı Stok Gösterimi (Tüm Birimler) ───
    function stokBilgisiGuncelle(selectElement) {
        const row = selectElement.closest('.kalem-satiri');
        const bilgiElementi = row.querySelector('.kalem-stok-bilgi');
        const secilenCins = selectElement.value;
        const stoklar = mevcutStokData.filter(s => s.kalem === secilenCins);

        if (stoklar.length > 0) {
            bilgiElementi.innerHTML = stoklar.map(s => 
                `<span class="badge bg-light text-primary border border-primary me-1 mb-1" style="font-weight:700;">
                    <i class="bi bi-box-seam me-1"></i> ${s.miktar} ${s.birim}
                </span>`
            ).join('');
            bilgiElementi.className = 'mt-2 d-block kalem-stok-bilgi';
        } else {
            bilgiElementi.innerHTML = `<i class="bi bi-info-circle"></i> Stok kaydı yok`;
            bilgiElementi.className = 'text-muted small mt-1 d-block kalem-stok-bilgi';
        }
    }

    // ─── Formu Sıfırla ───
    function formuSifirla() {
        document.getElementById('sevk_eden_cari_select').value = '';
        document.getElementById('sevk_eden_cari_manual').value = '';
        document.getElementById('sevk_eden_cari_manual').style.display = 'none';

        document.getElementById('plaka_no').value = '';

        document.getElementById('sevk_yeri_fabrika_select').value = '';
        document.getElementById('sevk_yeri_fabrika_manual').value = '';
        document.getElementById('sevk_yeri_fabrika_manual').style.display = 'none';

        document.getElementById('sevk_yeri_fis_no').value = '';
        document.getElementById('kalemlerContainer').innerHTML = '';
        document.getElementById('kalemUyari').style.display = 'block';
        kalemSayaci = 0;
    }

    // ─── Modal Göster ───
    function modalGoster(basarili, mesaj) {
        const modal = new bootstrap.Modal(document.getElementById('sonucModal'));
        const header = document.getElementById('sonucModalHeader');
        const icon = document.getElementById('sonucModalIcon');
        const title = document.getElementById('sonucModalTitle');
        const msg = document.getElementById('sonucModalMesaj');
        const footer = document.getElementById('sonucModalFooter');

        if (basarili) {
            header.style.background = 'var(--ma-gradient)';
            header.style.color = '#fff';
            icon.textContent = '✅';
            title.textContent = 'Başarılı!';
            footer.style.display = '';
        } else {
            header.style.background = 'var(--ma-danger)';
            header.style.color = '#fff';
            icon.textContent = '❌';
            title.textContent = 'Hata!';
            footer.style.display = 'none';
        }
        msg.textContent = mesaj;
        modal.show();
    }

    // ─── Fiş Kaydet ───
    function fisKaydet() {
        // Değerleri Akıllıca Topla (Select veya Manuel)
        const tarih = document.getElementById('tarih').value;
        const plaka = document.getElementById('plaka_no').value.trim();
        const fisNo = document.getElementById('sevk_yeri_fis_no').value.trim();

        const cariSelect = document.getElementById('sevk_eden_cari_select');
        const sevkEdenCari = cariSelect.value === 'other'
            ? document.getElementById('sevk_eden_cari_manual').value.trim()
            : (cariSelect.options[cariSelect.selectedIndex]?.getAttribute('data-adi') || '');

        const fabrikaSelect = document.getElementById('sevk_yeri_fabrika_select');
        const fabrika = fabrikaSelect.value === 'other'
            ? document.getElementById('sevk_yeri_fabrika_manual').value.trim()
            : (fabrikaSelect.options[fabrikaSelect.selectedIndex]?.getAttribute('data-adi') || '');

        if (!tarih || !sevkEdenCari || !plaka || !fabrika || !fisNo) {
            modalGoster(false, 'Lütfen tüm kamyon/fiş bilgilerini doldurun.');
            return;
        }

        // Kalem satırlarını topla
        const kalemDivler = document.querySelectorAll('.kalem-satiri');
        if (kalemDivler.length === 0) {
            modalGoster(false, 'En az bir sevk edilen odun cinsi satırı eklemelisiniz.');
            return;
        }

        const kalemler = [];
        let gecerli = true;

        kalemDivler.forEach((div) => {
            const agac = div.querySelector('.kalem-agac').value;
            const cap = div.querySelector('.kalem-cap').value;
            const miktar = parseFloat(div.querySelector('.kalem-miktar').value);
            const birim = div.querySelector('.kalem-birim').value;
            const birimFiyat = parseFloat(div.querySelector('.kalem-birim-fiyat').value);
            const stokDisi = div.querySelector('.kalem-stok-disi').checked;

            if (isNaN(miktar) || miktar <= 0 || isNaN(birimFiyat) || birimFiyat < 0) {
                gecerli = false;
                return;
            }

            kalemler.push({
                agac_cinsi: agac,
                cap: cap,
                miktar: miktar,
                birim: birim,
                birim_fiyat: birimFiyat,
                stok_disi_birak: stokDisi
            });
        });

        if (!gecerli || kalemler.length === 0) {
            modalGoster(false, 'Lütfen tüm satırlarda miktar ve birim fiyat değerlerini doğru girin.');
            return;
        }

        // Gönder
        const btnKaydet = document.getElementById('btnKaydet');

        btnKaydet.disabled = true;
        btnKaydet.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Kaydediliyor...';

        const veri = {
            tarih: tarih,
            sevk_eden_cari: sevkEdenCari,
            cari_kodu: cariSelect.value === 'other' ? null : (cariSelect.value || null),
            sevk_yeri_fabrika: fabrika,
            fabrika_kodu: fabrikaSelect.value === 'other' ? null : (fabrikaSelect.value || null),
            sevk_yeri_fis_no: fisNo,
            plaka_no: plaka,
            kalemler: kalemler
        };

        fetch("{{ url_for('fis.yeni_fis_kaydet') }}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(veri),
        })
            .then(res => res.json())
            .then(data => {
                btnKaydet.disabled = false;
                btnKaydet.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Fişi Kaydet';

                if (data.durum === 'basarili') {
                    modalGoster(true, data.mesaj);
                } else {
                    modalGoster(false, data.mesaj || 'Bilinmeyen bir hata oluştu.');
                }
            })
            .catch(err => {
                btnKaydet.disabled = false;
                btnKaydet.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Fişi Kaydet';
                modalGoster(false, 'Sunucu ile bağlantı kurulamadı: ' + err.message);
            });
    }

    // İlk açılışta bir kalem satırı otomatik ekle
    kalemEkle();
</script>
{% endblock %}
